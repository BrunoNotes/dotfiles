# Send prefix
set-option -g prefix C-b
unbind-key C-b
bind-key C-b send-prefix

#### Keybindings ####

# Easy config reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# Alt arrow to switch windows/panes
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-Up next-pane

# Mouse mode
set -g mouse on

# Set easier window split keys
bind-key h split-window -h
bind-key v split-window -v

# Open-window
bind-key n new-window
# Close-Window
bind-key q kill-window

# Removes esc lag in vim
set -sg escape-time 0

#### Cutomization ####
set-option -g status-position bottom    # bar position
set-option -g status-style bg=black,fg=white    # bar color

set-option -g status-left '#[bold]#(echo "T-Ses:")#{session_name}'
set-option -g status-left-length 10

set-option -g status-justify centre

set-option -g status-right ''

set-option -g automatic-rename on   # change name of the window to program

set-option -g window-status-format '#{window_index}#(echo ":")#{window_name}'
set-option -g window-status-current-format '#[bold,fg=black,bg=white]#{window_index}#(echo ":")#{window_name}'

